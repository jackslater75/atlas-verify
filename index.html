<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica Tessera | Atlas APS</title>
    <!-- Tailwind CSS for WOW aesthetics -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .amber-glow { filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3)); }
        @keyframes shine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        .shimer { position: relative; overflow: hidden; }
        .shimer::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shine 2s infinite; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">

    <!-- Background Decorative Elements -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-amber-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/5 blur-[120px] rounded-full opacity-50"></div>
    </div>

    <div id="app" class="max-w-md w-full relative z-10 space-y-8 animate-in fade-in duration-1000">
        <!-- Initial Loader -->
        <div id="loader" class="flex flex-col items-center justify-center space-y-6">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-amber-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-amber-500 rounded-full border-t-transparent animate-spin"></div>
                <i data-lucide="shield-check" class="w-10 h-10 text-amber-500 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
            </div>
            <div class="text-center">
                <h1 class="text-xs font-black text-amber-500 uppercase tracking-[0.4em] mb-2">Verifica Atlas Secure</h1>
                <p id="loader-text" class="text-neutral-500 text-[10px] font-bold uppercase tracking-widest">Inizializzazione connessione sicura...</p>
            </div>
        </div>

        <!-- Result Content (Hidden by default) -->
        <div id="result" class="hidden space-y-8">
            <!-- Header Logo -->
            <div class="flex flex-col items-center space-y-4">
                <div class="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-amber-500/20 border border-amber-400/50 rotate-3 shimer">
                    <span class="text-3xl font-black text-black">A!</span>
                </div>
                <div class="text-center">
                    <h2 class="text-[10px] font-black text-amber-500 uppercase tracking-[0.3em] mb-1">Atlas APS Manager</h2>
                    <div class="h-[1px] w-8 bg-amber-500/50 mx-auto"></div>
                </div>
            </div>

            <!-- Main Status Card -->
            <div id="status-card" class="relative group">
                <div id="status-glow" class="absolute -inset-1 rounded-[32px] blur-xl opacity-20 bg-amber-500"></div>
                
                <div class="relative bg-neutral-900/40 glass rounded-[32px] p-8 overflow-hidden shimer border border-white/5">
                    <!-- Decorative Svg Background -->
                    <svg class="absolute top-0 right-0 w-32 h-32 opacity-5 pointer-events-none" viewBox="0 0 100 100" fill="none">
                        <path d="M0 0Q50 50 100 0V100H0V0Z" fill="url(#grad)" />
                        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#f59e0b" /><stop offset="100%" stopColor="transparent" /></linearGradient></defs>
                    </svg>

                    <div class="flex flex-col items-center text-center space-y-6">
                        <div id="status-icon-container" class="relative">
                            <!-- Icons injected via JS -->
                        </div>

                        <div class="space-y-1">
                            <p id="status-label" class="text-xs font-black uppercase tracking-[0.2em] mb-2"></p>
                            <h3 id="member-name" class="text-3xl font-black text-white tracking-tighter uppercase italic leading-none"></h3>
                            <div id="role-badge" class="mt-4 inline-flex items-center gap-2 px-3 py-1 bg-white/5 border border-white/10 rounded-full">
                                <i data-lucide="award" class="w-3 h-3 text-amber-500"></i>
                                <span id="member-role" class="text-[10px] font-black text-neutral-300 uppercase tracking-widest"></span>
                            </div>
                        </div>

                        <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

                        <div class="grid grid-cols-2 gap-4 w-full">
                            <div class="text-left">
                                <p class="text-[8px] font-black text-neutral-500 uppercase tracking-widest mb-1">Stato Membership</p>
                                <p id="status-detail" class="text-xs font-bold uppercase"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-neutral-500 uppercase tracking-widest mb-1">Anno Validità</p>
                                <div class="flex items-center justify-end gap-1.5 font-bold text-neutral-300 text-xs">
                                    <i data-lucide="calendar" class="w-3 h-3"></i>
                                    <span id="current-year"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center space-y-6 px-4">
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/5 rounded-2xl backdrop-blur-xl opacity-60">
                    <i data-lucide="check" class="w-3 h-3 text-emerald-500"></i>
                    <span class="text-[9px] font-bold text-neutral-400 uppercase tracking-widest">Verifica Certificata Atlas APS</span>
                </div>
                <p class="text-[10px] text-neutral-600 font-medium leading-relaxed max-w-[280px] mx-auto uppercase tracking-tighter">
                    I dati sono estratti in tempo reale dal registro ufficiale soci e partecipanti.
                </p>
            </div>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden flex flex-col items-center space-y-6 text-center animate-in zoom-in duration-500">
            <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center border border-red-500/20">
                <i data-lucide="alert-triangle" class="w-10 h-10 text-red-500"></i>
            </div>
            <div class="space-y-4">
                <h1 class="text-3xl font-black text-white italic uppercase italic leading-none">Errore Verifica</h1>
                <p id="error-message" class="text-neutral-400 font-bold uppercase tracking-widest text-xs max-w-[250px]"></p>
                <div class="p-4 bg-neutral-900 border border-white/5 rounded-2xl font-mono text-xs text-amber-500" id="error-code"></div>
            </div>
            <button onclick="window.location.reload()" class="px-6 py-2 bg-neutral-800 hover:bg-neutral-700 rounded-full text-[10px] font-black uppercase tracking-widest transition-colors">Riprova</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE TURSO (RICAPERATA DA .ENV.LOCAL)
        const DB_URL = "https://atlas-db-atlasaps.aws-eu-west-1.turso.io";
        const RO_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicm8iLCJpYXQiOjE3NzU0MjQxMjQsImlkIjoiMDE5Y2FlNGQtMTYwMS03OTU3LTgxZWQtOTQ4YzdjZDRjMmNjIiwicmlkIjoiZjQ3ZDg3N2UtYjMxMi00NjI1LTg2MDMtODI1YmI0MmU0ZGVhIn0.uFWQZ0cDYoaybjv5ltOq9uySkKJwd3FltGn-48hz7YdY9Y1n_b4M-VPqkgvRjkDgwlEEcgoVg1_KWrQFTdQsDw";

        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('id');

        async function verify() {
            if (!memberId) {
                showError("Identificativo tessera mancante nell'indirizzo.");
                return;
            }

            document.getElementById('loader-text').innerText = "Interrogazione Database Atlas...";

            try {
                // Fetch directly from Turso HTTP API
                const response = await fetch(`${DB_URL}/v2/pipeline`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${RO_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        requests: [
                            { 
                                type: "execute", 
                                stmt: { 
                                    sql: "SELECT nome, cognome, ruolo, attivo, 'Socio' as tipo FROM soci WHERE UPPER(numeroTessera) = UPPER(?) " +
                                         "UNION SELECT nome, cognome, 'Partecipante' as ruolo, attivo, 'Partecipante' as tipo FROM partecipanti WHERE UPPER(numeroTessera) = UPPER(?) " +
                                         "UNION SELECT nome, cognome, 'Volontario' as ruolo, 1 as attivo, 'Volontario' as tipo FROM volontari WHERE UPPER(numeroTessera) = UPPER(?)", 
                                    args: [memberId, memberId, memberId] 
                                } 
                            },
                            { type: "close" }
                        ]
                    })
                });

                if (!response.ok) throw new Error("Connessione al database fallita.");

                const data = await response.json();
                const result = data.results[0].response.result;

                if (result.rows.length === 0) {
                    showError("Nessun tesserato trovato con questo identificativo.", memberId);
                    return;
                }

                const member = result.rows[0];
                // Column order based on query: 0:nome, 1:cognome, 2:ruolo, 3:attivo, 4:tipo
                // Note: Turso results come as rows array with [v1, v2, ...]
                renderResult({
                    nome: member[0].value,
                    cognome: member[1].value,
                    ruolo: member[2].value,
                    attivo: member[3].value === 1,
                    tipo: member[4].value
                });

            } catch (err) {
                console.error(err);
                showError("Errore durante la comunicazione con il server.");
            }
        }

        function renderResult(member) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            document.getElementById('member-name').innerText = `${member.nome} ${member.cognome}`;
            document.getElementById('member-role').innerText = member.ruolo;
            document.getElementById('current-year').innerText = new Date().getFullYear();

            const statusLabel = document.getElementById('status-label');
            const statusDetail = document.getElementById('status-detail');
            const statusGlow = document.getElementById('status-glow');
            const iconContainer = document.getElementById('status-icon-container');

            if (member.attivo) {
                statusLabel.innerText = "Verifica Riuscita";
                statusLabel.classList.add('text-emerald-500');
                statusDetail.innerText = "Attivo";
                statusDetail.classList.add('text-emerald-400');
                statusGlow.classList.add('bg-emerald-500');
                iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 amber-glow"></i>';
            } else {
                statusLabel.innerText = "Tessera Non Attiva";
                statusLabel.classList.add('text-red-500');
                statusDetail.innerText = "Non Attivo";
                statusDetail.classList.add('text-red-400');
                statusGlow.classList.add('bg-red-500');
                iconContainer.innerHTML = '<i data-lucide="x-circle" class="w-16 h-16 text-red-500"></i>';
            }

            lucide.createIcons();
        }

        function showError(msg, code = "") {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-code').innerText = code || "ERR_VERIFY_FAIL";
            lucide.createIcons();
        }

        // Initialize icons and start verification
        lucide.createIcons();
        setTimeout(verify, 1200); // Small delay for "Aesthetic" loading
    </script>
</body>
</html>
